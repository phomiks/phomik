<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электроноль — Приемник</title>
    <!-- Подключаем библиотеку PeerJS для беспроводной связи между телефонами -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 16px; text-align: center; }
        .card { background: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; background: #334155; color: #94a3b8; margin-bottom: 12px; }
        .status-ready { background: #065f46; color: #34d399; }
        .status-locked { background: #991b1b; color: #fca5a5; }
        
        .result-box { font-size: 72px; font-weight: 900; margin: 15px 0; padding: 25px; border-radius: 16px; background: #0f172a; border: 3px solid #334155; transition: all 0.3s ease; }
        .result-zero { background: #14532d; border-color: #22c55e; color: #4ade80; text-shadow: 0 0 20px rgba(34,197,94,0.6); }
        
        .timer-container { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .timer-bar { height: 100%; background: #38bdf8; width: 0%; transition: width 0.1s linear; }
        
        .btn { background: #0284c7; color: white; border: none; padding: 16px; font-size: 18px; font-weight: 700; border-radius: 14px; cursor: pointer; width: 100%; margin: 6px 0; active { transform: scale(0.98); } }
        .btn-reset { background: #ef4444; }
        .btn-ble { background: #10b981; }

        .peer-info { font-family: monospace; font-size: 18px; color: #38bdf8; background: #0f172a; padding: 10px; border-radius: 10px; margin: 10px 0; border: 1px dashed #38bdf8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #334155; text-align: center; }
        th { color: #94a3b8; background: #0f172a; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <div id="statusBadge" class="status-badge">НЕ ПОДКЛЮЧЕНО</div>
        
        <div id="resultDisplay" class="result-box">---</div>
        
        <div class="timer-container">
            <div id="timerBar" class="timer-bar"></div>
        </div>

        <button id="resetBtn" class="btn btn-reset" onclick="manualReset()">СБРОС (РУЧНОЙ)</button>
        <button id="bleBtn" class="btn btn-ble" onclick="connectBLE()">ПОДКЛЮЧИТЬ BLE ESP32</button>
    </div>

    <!-- Блок эмуляции для второго телефона -->
    <div class="card">
        <div style="font-size: 14px; color: #94a3b8;">Код для второго телефона (Тест-режим):</div>
        <div id="peerCode" class="peer-info">Генерация...</div>
    </div>

    <!-- Таблица результатов -->
    <div class="card">
        <h3 style="margin-top: 0; text-align: left; font-size: 18px;">📋 Лог прыжков</h3>
        <table>
            <thead>
                <tr>
                    <th>№</th>
                    <th>Время</th>
                    <th>Результат</th>
                </tr>
            </thead>
            <tbody id="logTable">
                <!-- Записи добавляются сюда -->
            </tbody>
        </table>
    </div>

    <script>
        // UUID для BLE ESP32 (стандартные настройки)
        const BLE_SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const BLE_CHAR_UUID    = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

        let isLocked = false;
        let timerInterval = null;
        let jumpCount = 0;
        let bleCharacteristic = null;

        // Инициализация аудио-синтезатора для звука при попадании
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(isZero) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (isZero) {
                // Победный двойной высокий тон
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // La (A5)
                osc.frequency.setValueAtTime(1760, audioCtx.currentTime + 0.15); // La (A6)
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else {
                // Обычный короткий писк
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        // Главная функция обработки касания
        function processHit(zone) {
            if (isLocked) return; // Игнорируем повторные касания

            isLocked = true;
            updateStatus('ЗАБЛОКИРОВАНО', 'status-locked');
            
            const display = document.getElementById('resultDisplay');
            display.innerText = zone;
            
            const isZero = (zone === "0");
            if (isZero) {
                display.classList.add('result-zero');
            } else {
                display.classList.remove('result-zero');
            }

            playBeep(isZero);
            addLog(zone);
            startAutoResetTimer(10);
        }

        function updateStatus(text, className) {
            const badge = document.getElementById('statusBadge');
            badge.innerText = text;
            badge.className = `status-badge ${className}`;
        }

        function addLog(result) {
            jumpCount++;
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const tbody = document.getElementById('logTable');
            const row = document.createElement('tr');
            row.innerHTML = `<td><b>${jumpCount}</b></td><td>${timeStr}</td><td><b>${result} см</b></td>`;
            tbody.insertBefore(row, tbody.firstChild);
        }

        function startAutoResetTimer(seconds) {
            clearInterval(timerInterval);
            const timerBar = document.getElementById('timerBar');
            let timeLeft = seconds * 10; // децисекунды

            timerInterval = setInterval(() => {
                timeLeft--;
                const percentage = (timeLeft / (seconds * 10)) * 100;
                timerBar.style.width = percentage + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    manualReset();
                }
            }, 100);
        }

        function manualReset() {
            clearInterval(timerInterval);
            document.getElementById('timerBar').style.width = '0%';
            
            const display = document.getElementById('resultDisplay');
            display.innerText = "ГОТОВ";
            display.classList.remove('result-zero');

            isLocked = false;
            updateStatus('ГОТОВ К ПРЫЖКУ', 'status-ready');

            // Отправляем команду сброса на ESP32 (если подключена по BLE)
            if (bleCharacteristic) {
                const encoder = new TextEncoder();
                bleCharacteristic.writeValue(encoder.encode("RESET")).catch(() => {});
            }
        }

        // Web Bluetooth API (Для подключения настоящей ESP32)
        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: [BLE_SERVICE_UUID]
                });

                updateStatus('ПОДКЛЮЧЕНИЕ...', '');
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(BLE_CHAR_UUID);

                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = new TextDecoder().decode(event.target.value).trim();
                    processHit(value);
                });

                manualReset();
            } catch (error) {
                alert('Ошибка BLE: ' + error);
                updateStatus('ОШИБКА BLE', 'status-locked');
            }
        }

        // WebRTC (PeerJS) — Создаем уникальный ID для эмулятора со второго телефона
        const randomId = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('peerCode').innerText = randomId;

        const peer = new Peer('nol-' + randomId);
        peer.on('connection', (conn) => {
            updateStatus('ЭМУЛЯТОР ПОДКЛЮЧЕН', 'status-ready');
            conn.on('data', (data) => {
                if (data === "RESET") {
                    manualReset();
                } else {
                    processHit(data);
                }
            });
        });
    </script>
</body>
</html>
